<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Découvrez plus de 300 bourses internationales actualisées. Filtres par pays, niveau et recherche.">
    <meta name="keywords" content="bourses internationales, bourse Turquie, bourse Erasmus, bourse France">
    <meta name="author" content="RCEB">
    <meta name="robots" content="index, follow">
    
    <title>Bourses - RCEB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:#f9fafb;overflow-x:hidden;}
        .container{max-width:1200px;margin:0 auto;padding:0 16px;}
        .navbar{background:white;border-radius:24px;margin:16px auto;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
        .logo{font-weight:700;font-size:1.2rem;color:#2563eb;}
        .nav-links{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;}
        .nav-links a{text-decoration:none;color:#1f2937;font-weight:500;font-size:0.9rem;}
        .filters{background:white;border-radius:20px;padding:20px;margin:20px 0;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
        .filter-group{display:flex;flex-direction:column;gap:4px;}
        .filter-group label{font-weight:600;font-size:0.75rem;}
        input,select{padding:8px 12px;border-radius:40px;border:1px solid #d1d5db;font-family:inherit;font-size:0.85rem;}
        button{background:#2563eb;color:white;border:none;padding:8px 20px;border-radius:40px;cursor:pointer;font-weight:600;}
        .results-count{margin:16px 0;font-weight:600;font-size:0.9rem;}
        .bourse-card{background:white;border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
        .bourse-title{font-size:1.1rem;font-weight:700;color:#1e3a8a;}
        .bourse-meta{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;}
        .badge{background:#e0f2fe;color:#0369a1;padding:4px 10px;border-radius:40px;font-size:0.7rem;}
        .deadline{color:#b91c1c;font-weight:600;}
        .bourse-desc{color:#4b5563;margin:10px 0;font-size:0.85rem;}
        .btn-link{background:#2563eb;color:white;padding:6px 16px;border-radius:40px;text-decoration:none;display:inline-block;font-size:0.8rem;}
        .counter{background:#f3f4f6;border-radius:60px;padding:6px 16px;display:inline-block;margin-bottom:16px;font-size:0.8rem;}
        .shop-promo{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;border-radius:60px;padding:10px 16px;text-align:center;margin:16px 0;}
        .shop-promo a{color:white;text-decoration:none;font-weight:600;font-size:0.85rem;}
